services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: carserv_app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mariadb:11.4
    container_name: carserv_db
    restart: unless-stopped
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${DB_DATABASE:-carserv}
      MARIADB_USER: ${DB_USERNAME:-carserv}
      MARIADB_PASSWORD: ${DB_PASSWORD:-carserv123}
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: carserv_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-carserv}
      PMA_PASSWORD: ${DB_PASSWORD:-carserv123}
    depends_on:
      - db

volumes:
  db_data:
